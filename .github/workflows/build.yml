name: Build and Release

# This allows you to manually trigger the workflow and type a version number
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  # ==========================================
  # JOB 1: Build the Android APK (Ubuntu)
  # ==========================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake gettext automake liblzma-dev uuid-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer "cython<3"

      - name: Build APK
        working-directory: ./client
        run: yes | buildozer android debug

      # Save the APK temporarily for the Release Job
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Overdrive-Android
          path: client/bin/*.apk

  # ==========================================
  # JOB 2: Build the Windows EXE (Windows)
  # ==========================================
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install Dependencies & PyInstaller
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        working-directory: ./server
        # --noconsole hides the black CMD window behind the UI
        # --onefile packs everything into a single .exe
        run: |
          pyinstaller --noconfirm --onefile --windowed --icon=icon.ico --name "Overdrive_Server" server_pro.py

      # Save the EXE temporarily for the Release Job
      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Overdrive-Windows
          path: server/dist/Overdrive_Server.exe

  # ==========================================
  # JOB 3: Package and Create GitHub Release
  # ==========================================
  create-release:
    name: Create GitHub Release
    needs: [build-android, build-windows] # Waits for both builds to finish!
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: Overdrive-Android
          path: release-files/

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: Overdrive-Windows
          path: release-files/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Overdrive Release ${{ github.event.inputs.version }}
          body: "Includes the Android APK client and the Windows EXE server."
          files: release-files/*
          draft: false
          prerelease: false
